<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ECG Intégration — Connexion</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0d2b5e 0%, #1a3a6b 40%, #0066cc 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at 30% 40%, rgba(255,255,255,0.05) 0%, transparent 50%),
                  radial-gradient(circle at 70% 60%, rgba(0,102,204,0.3) 0%, transparent 50%);
      pointer-events: none;
    }
    .login-card {
      background: #ffffff;
      border-radius: 20px;
      padding: 48px 44px;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.25);
      position: relative;
      z-index: 1;
    }
    .logo-wrap {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo-wrap img {
      height: 64px;
      object-fit: contain;
    }
    .divider {
      height: 1px;
      background: #e5e9f0;
      margin: 24px 0;
    }
    .login-title {
      font-size: 22px;
      font-weight: 700;
      color: #1a2b4a;
      text-align: center;
      margin-bottom: 6px;
    }
    .login-subtitle {
      font-size: 14px;
      color: #6b7a99;
      text-align: center;
      margin-bottom: 28px;
    }
    .form-group {
      margin-bottom: 18px;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #1a2b4a;
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid #d0dff0;
      border-radius: 10px;
      font-size: 14px;
      color: #1a2b4a;
      background: #f5f8fd;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input:focus {
      border-color: #1a3a6b;
      box-shadow: 0 0 0 3px rgba(26,58,107,0.1);
      background: #fff;
    }
    .btn-login {
      width: 100%;
      padding: 14px;
      background: #1a3a6b;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s, transform 0.1s;
      letter-spacing: 0.3px;
    }
    .btn-login:hover { background: #0d2b5e; }
    .btn-login:active { transform: scale(0.98); }
    .btn-login:disabled { background: #8a9bc0; cursor: not-allowed; }
    .error-msg {
      background: #fef2f2;
      border: 1px solid #fca5a5;
      color: #dc2626;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-top: 14px;
      display: none;
    }
    .hint-box {
      background: #f0f6ff;
      border: 1px solid #c7ddf7;
      border-radius: 10px;
      padding: 12px 16px;
      margin-top: 20px;
    }
    .hint-box p {
      font-size: 12px;
      color: #4a6fa5;
      line-height: 1.6;
    }
    .hint-box strong { color: #1a3a6b; }
    .footer-text {
      text-align: center;
      font-size: 12px;
      color: #8a9bc0;
      margin-top: 24px;
    }
    .loading-spinner {
      display: none;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo-wrap">
      <img src="/img/logo-ecg.jpg" alt="ECG Group" />
    </div>
    <div class="divider"></div>
    <h1 class="login-title">Plateforme d'Intégration</h1>
    <p class="login-subtitle">Connectez-vous à votre espace collaborateur</p>

    <form id="loginForm">
      <div class="form-group">
        <label for="login">Identifiant ou Email</label>
        <input type="text" id="login" name="login" placeholder="prenom.nom ou email@ecg-group.com" autocomplete="username" required />
      </div>
      <div class="form-group">
        <label for="password">Mot de passe</label>
        <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required />
      </div>
      <button type="submit" class="btn-login" id="btnLogin">
        <span id="btnText">Se connecter</span>
        <div class="loading-spinner" id="spinner"></div>
      </button>
      <div class="error-msg" id="errorMsg"></div>
    </form>



    <p class="footer-text">© 2026 ECG Group — Projet Intégration INTEG-2026</p>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('btnLogin');
      const spinner = document.getElementById('spinner');
      const btnText = document.getElementById('btnText');
      const errorMsg = document.getElementById('errorMsg');

      btn.disabled = true;
      btnText.style.display = 'none';
      spinner.style.display = 'block';
      errorMsg.style.display = 'none';

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            login: document.getElementById('login').value.trim(),
            password: document.getElementById('password').value
          })
        });
        const data = await res.json();
        if (data.success) {
          window.location.href = data.redirect || '/dashboard';
        } else {
          errorMsg.textContent = data.message || 'Identifiant ou mot de passe incorrect';
          errorMsg.style.display = 'block';
          btn.disabled = false;
          btnText.style.display = 'block';
          spinner.style.display = 'none';
        }
      } catch {
        errorMsg.textContent = 'Erreur de connexion. Veuillez réessayer.';
        errorMsg.style.display = 'block';
        btn.disabled = false;
        btnText.style.display = 'block';
        spinner.style.display = 'none';
      }
    });
  </script>
</body>
</html>
